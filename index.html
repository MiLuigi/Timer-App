<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Minuteur Avancé</title>
<meta name="description" content="Créez des séquences de minuteurs personnalisées, sauvegardez vos profils et lancez-les en un geste.">
<meta name="theme-color" content="#534AB7">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Minuteur">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --accent:#534AB7;--accent-light:#EEEDFE;--accent-text:#3C3489;--danger:#E24B4A;--success:#1D9E75;--warn:#BA7517;
  --color-background-primary:#ffffff;--color-background-secondary:#F4F4F6;
  --color-text-primary:#1B1B1F;--color-text-secondary:#6E6E76;
  --color-border-primary:#D8D8DD;--color-border-secondary:#D0D0D6;--color-border-tertiary:#E7E7EB;
}
@media (prefers-color-scheme: dark){
  :root{
    --accent:#9A91E8;--accent-light:#2A2750;--accent-text:#D2CDF7;
    --color-background-primary:#18181C;--color-background-secondary:#222226;
    --color-text-primary:#F2F2F4;--color-text-secondary:#9B9BA3;
    --color-border-primary:#3A3A40;--color-border-secondary:#34343A;--color-border-tertiary:#28282D;
  }
}
html,body{height:100%;overscroll-behavior:none;background:var(--color-background-primary)}
body{-webkit-tap-highlight-color:transparent;font-family:var(--font-sans)}
button{touch-action:manipulation;-webkit-user-select:none;user-select:none}
input{font-family:var(--font-sans)}
.screen{display:none}.screen.active{display:block}
.ico{display:inline-flex;flex-shrink:0;width:20px;height:20px}
.ico svg{width:100%;height:100%}
.ico-lg{width:22px;height:22px}
.ico-sm{width:14px;height:14px}
.ico-xl{width:32px;height:32px;display:block;margin:0 auto 8px}
.topbar{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:0.5px solid var(--color-border-tertiary);position:sticky;top:0;background:var(--color-background-primary);z-index:10}
.topbar h1{font-size:16px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-icon{background:none;border:none;cursor:pointer;padding:6px;border-radius:8px;color:var(--color-text-secondary);font-size:20px;display:flex;align-items:center}
.btn-icon:hover{background:var(--color-background-secondary)}
.btn{border:0.5px solid var(--color-border-secondary);background:transparent;border-radius:8px;padding:8px 16px;font-size:14px;cursor:pointer;color:var(--color-text-primary);font-family:var(--font-sans);display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn:hover{background:var(--color-background-secondary)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{filter:brightness(0.92)}
.btn.danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.section{padding:16px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;padding:14px;margin-bottom:10px}
.step-row{display:flex;align-items:center;gap:6px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:10px;padding:10px 10px;margin-bottom:8px}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--accent-light);color:var(--accent-text);font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-label{flex:1;font-size:14px;color:var(--color-text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.step-dur{font-size:13px;color:var(--color-text-secondary);margin-right:2px;flex-shrink:0}
input[type=text],input[type=number]{border:0.5px solid var(--color-border-secondary);border-radius:8px;padding:8px 12px;font-size:14px;background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-sans);width:100%}
input[type=text]:focus,input[type=number]:focus{outline:none;border-color:var(--accent)}
.label{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.row{display:flex;gap:8px;align-items:center}
.timer-display{text-align:center;padding:32px 16px}
.timer-big{font-size:72px;font-weight:500;letter-spacing:-2px;color:var(--color-text-primary);font-variant-numeric:tabular-nums}
.timer-step-name{font-size:16px;color:var(--color-text-secondary);margin-top:4px}
.timer-progress{width:100%;height:6px;background:var(--color-background-secondary);border-radius:3px;margin:20px 0;overflow:hidden}
.timer-bar{height:100%;border-radius:3px;background:var(--accent);transition:width 0.9s linear}
.timer-controls{display:flex;gap:12px;justify-content:center;margin-top:8px}
.btn-round{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;border:none}
.btn-round.play{background:var(--accent);color:#fff}
.btn-round.stop{background:var(--danger);color:#fff}
.btn-round.skip{background:var(--color-background-secondary);color:var(--color-text-primary);width:48px;height:48px;font-size:20px}
.step-queue{padding:0 16px}
.q-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;margin-bottom:6px;opacity:0.5;font-size:14px}
.q-item.active{opacity:1;background:var(--accent-light);color:var(--accent-text)}
.q-item.done{opacity:0.3;text-decoration:line-through}
.q-dot{width:8px;height:8px;border-radius:50%;background:var(--color-border-primary);flex-shrink:0}
.q-item.active .q-dot{background:var(--accent)}
.profile-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer}
.profile-card:hover{border-color:var(--accent)}
.profile-name{font-size:15px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.profile-meta{font-size:12px;color:var(--color-text-secondary);margin-top:3px}
.total-badge{display:inline-block;background:var(--accent-light);color:var(--accent-text);border-radius:6px;padding:2px 8px;font-size:12px;font-weight:500}
.empty{text-align:center;color:var(--color-text-secondary);font-size:14px;padding:40px 20px}
.nav{display:flex;border-top:0.5px solid var(--color-border-tertiary);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:var(--color-background-primary);z-index:20;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 8px;font-size:10px;color:var(--color-text-secondary);cursor:pointer;border:none;background:none;font-family:var(--font-sans)}
.nav-btn.active{color:var(--accent)}
.finish-banner{background:#EAF3DE;border:0.5px solid #97C459;border-radius:12px;padding:16px;text-align:center;margin:16px}
.finish-banner p{color:#3B6D11;font-size:15px;font-weight:500}
.finish-banner small{color:#639922;font-size:13px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--color-background-primary);border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:420px;padding-bottom:calc(20px + env(safe-area-inset-bottom))}
.modal h2{font-size:16px;font-weight:500;margin-bottom:16px}
.edit-badge{display:flex;align-items:center;gap:4px;background:var(--accent-light);color:var(--accent-text);font-size:11px;font-weight:500;border-radius:999px;padding:3px 4px 3px 9px;flex-shrink:0}
.edit-badge button{background:none;border:none;color:inherit;display:flex;align-items:center;cursor:pointer;padding:3px;border-radius:50%}
.edit-badge button:hover{background:rgba(0,0,0,0.08)}
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--color-text-primary);color:var(--color-background-primary);padding:10px 18px;border-radius:10px;font-size:13px;opacity:0;transition:opacity .25s,transform .25s;z-index:200;pointer-events:none;max-width:85%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app" style="max-width:420px;margin:0 auto;font-family:var(--font-sans);padding:0 0 2rem;">

<!-- SCREEN: EDITOR -->
<div class="screen active" id="screen-editor">
  <div class="topbar">
    <h1 id="seq-title-display">Nouvelle séquence</h1>
    <span class="edit-badge" id="edit-badge" style="display:none">
      <span class="ico ico-sm" data-i="pencil"></span><span id="edit-badge-text">Modification</span>
      <button onclick="cancelEditing()" title="Nouvelle séquence"><span class="ico ico-sm" data-i="x"></span></button>
    </span>
    <button class="btn-icon" onclick="openRenameModal()" title="Renommer"><span class="ico" data-i="pencil"></span></button>
  </div>
  <div class="section">
    <div id="steps-list"></div>
    <button class="btn" style="width:100%;margin-top:4px" onclick="addStep()"><span class="ico ico-sm" data-i="plus"></span> Ajouter un minuteur</button>
  </div>
  <div class="section" style="padding-top:0">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span style="font-size:14px;font-weight:500">Total</span>
        <span class="total-badge" id="total-display">0s</span>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn primary" style="flex:1" onclick="startSequence()"><span class="ico ico-sm" data-i="play"></span> Lancer</button>
        <button class="btn" onclick="openSaveModal()"><span class="ico ico-sm" data-i="save"></span> Sauvegarder</button>
      </div>
    </div>
  </div>
</div>

<!-- SCREEN: TIMER -->
<div class="screen" id="screen-timer">
  <div class="topbar">
    <button class="btn-icon" onclick="stopAll()"><span class="ico" data-i="back"></span></button>
    <h1 id="timer-seq-name">Séquence</h1>
  </div>
  <div class="timer-display">
    <div class="timer-big" id="timer-display">00:21</div>
    <div class="timer-step-name" id="timer-step-name">Étape 1</div>
    <div class="timer-progress"><div class="timer-bar" id="timer-bar" style="width:100%"></div></div>
    <div style="font-size:13px;color:var(--color-text-secondary)" id="timer-remaining-steps"></div>
  </div>
  <div class="timer-controls">
    <button class="btn-round skip" onclick="skipStep()" title="Passer"><span class="ico ico-lg" data-i="skip"></span></button>
    <button class="btn-round play" id="btn-playpause" onclick="togglePause()"><span class="ico ico-lg" data-i="pause" style="width:24px;height:24px"></span></button>
    <button class="btn-round stop" onclick="stopAll()" title="Arrêter"><span class="ico ico-lg" data-i="stop"></span></button>
  </div>
  <div class="step-queue" id="step-queue" style="margin-top:20px"></div>
  <div id="finish-area"></div>
</div>

<!-- SCREEN: PROFILES -->
<div class="screen" id="screen-profiles">
  <div class="topbar"><h1>Profils sauvegardés</h1></div>
  <div class="section" id="profiles-list"></div>
</div>

<!-- NAV -->
<div class="nav">
  <button class="nav-btn active" id="nav-editor" onclick="showScreen('editor')">
    <span class="ico ico-lg" data-i="list"></span>Séquence
  </button>
  <button class="nav-btn" id="nav-profiles" onclick="showScreen('profiles')">
    <span class="ico ico-lg" data-i="bookmark"></span>Profils
  </button>
</div>

<!-- MODAL: ADD/EDIT STEP -->
<div class="modal-bg" id="modal-step">
  <div class="modal">
    <h2 id="modal-step-title">Ajouter un minuteur</h2>
    <div class="label">Nom (optionnel)</div>
    <input type="text" id="step-name-input" placeholder="ex: Pose, Repos, Cycle..." style="margin-bottom:12px">
    <div class="label">Durée</div>
    <div class="row" style="margin-bottom:16px">
      <div style="flex:1"><div class="label">min</div><input type="number" id="step-min" value="0" min="0" max="99" inputmode="numeric"></div>
      <div style="flex:1"><div class="label">sec</div><input type="number" id="step-sec" value="21" min="0" max="59" inputmode="numeric"></div>
    </div>
    <div class="row">
      <button class="btn" style="flex:1" onclick="closeModal('modal-step')">Annuler</button>
      <button class="btn primary" style="flex:1" onclick="saveStep()">Valider</button>
    </div>
  </div>
</div>

<!-- MODAL: SAVE / UPDATE PROFILE -->
<div class="modal-bg" id="modal-save">
  <div class="modal">
    <h2 id="modal-save-title">Sauvegarder le profil</h2>
    <div class="label">Nom du profil</div>
    <input type="text" id="profile-name-input" placeholder="ex: Mon entraînement, Recette..." style="margin-bottom:16px">
    <div class="row">
      <button class="btn" style="flex:1" onclick="closeModal('modal-save')">Annuler</button>
      <button class="btn primary" style="flex:1" id="modal-save-primary-btn" onclick="saveProfile('new')">Sauvegarder</button>
    </div>
    <button class="btn" id="modal-save-secondary-btn" style="width:100%;margin-top:8px;display:none" onclick="saveProfile('new')">Enregistrer comme nouveau profil</button>
  </div>
</div>

<!-- MODAL: RENAME -->
<div class="modal-bg" id="modal-rename">
  <div class="modal">
    <h2>Renommer la séquence</h2>
    <input type="text" id="rename-input" style="margin-bottom:16px">
    <div class="row">
      <button class="btn" style="flex:1" onclick="closeModal('modal-rename')">Annuler</button>
      <button class="btn primary" style="flex:1" onclick="applyRename()">OK</button>
    </div>
  </div>
</div>

<script>
/* ---------- Icônes (SVG inline, pas de dépendance réseau) ---------- */
const ICON = {
  pencil: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5Z"/></svg>',
  plus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>',
  save: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>',
  play: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7Z"/></svg>',
  pause: '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>',
  stop: '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>',
  skip: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 5v14l9-7Z"/><rect x="16" y="5" width="3" height="14" rx="1"/></svg>',
  chevUp: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 15 6-6 6 6"/></svg>',
  chevDown: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>',
  trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6"/><path d="M10 11v6M14 11v6"/></svg>',
  clock: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>',
  bookmark: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1Z"/></svg>',
  list: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6h11M9 12h11M9 18h11M4 6h.01M4 12h.01M4 18h.01"/></svg>',
  back: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>',
  x: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>'
};
function fillIcons(root){
  (root||document).querySelectorAll('[data-i]').forEach(el=>{ el.innerHTML = ICON[el.dataset.i] || ''; });
}

/* ---------- État ---------- */
let steps = [];
let editingStepIdx = null;
let editingProfileIndex = null; // null = nouvelle séquence, sinon index du profil en cours de modification
let seqName = "Nouvelle séquence";
let timerInterval = null;
let currentStepIdx = 0;
let timeLeft = 0;
let stepTotal = 0;
let stepEndTime = 0;
let pauseStarted = 0;
let paused = false;
let timerSteps = [];
let profiles = [];
let launchSource = 'editor'; // écran vers lequel revenir en quittant le minuteur

/* ---------- Persistance ---------- */
function loadData(){
  try{
    const s = localStorage.getItem('seq_steps');
    if(s) steps = JSON.parse(s);
    const n = localStorage.getItem('seq_name');
    if(n) seqName = n;
    const p = localStorage.getItem('seq_profiles');
    if(p) profiles = JSON.parse(p);
    const ei = localStorage.getItem('seq_editing_idx');
    editingProfileIndex = (ei!==null && ei!=='null' && profiles[parseInt(ei)]) ? parseInt(ei) : null;
  }catch(e){}
  renderSteps();
  updateTotal();
  document.getElementById('seq-title-display').textContent = seqName;
  updateEditingBadge();
}
function saveData(){
  try{
    localStorage.setItem('seq_steps', JSON.stringify(steps));
    localStorage.setItem('seq_name', seqName);
    localStorage.setItem('seq_editing_idx', editingProfileIndex===null ? 'null' : String(editingProfileIndex));
  }catch(e){}
}
function saveProfilesData(){
  try{ localStorage.setItem('seq_profiles', JSON.stringify(profiles)); }catch(e){}
}

/* ---------- Navigation ---------- */
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('nav-'+name)?.classList.add('active');
  if(name==='profiles') renderProfiles();
}
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

/* ---------- Étapes ---------- */
function addStep(){
  editingStepIdx = null;
  document.getElementById('modal-step-title').textContent = 'Ajouter un minuteur';
  document.getElementById('step-name-input').value = '';
  document.getElementById('step-min').value = 0;
  document.getElementById('step-sec').value = 21;
  openModal('modal-step');
}
function editStep(idx){
  editingStepIdx = idx;
  const s = steps[idx];
  document.getElementById('modal-step-title').textContent = 'Modifier le minuteur';
  document.getElementById('step-name-input').value = s.name||'';
  document.getElementById('step-min').value = Math.floor(s.dur/60);
  document.getElementById('step-sec').value = s.dur%60;
  openModal('modal-step');
}
function saveStep(){
  const name = document.getElementById('step-name-input').value.trim();
  const min = parseInt(document.getElementById('step-min').value)||0;
  const sec = parseInt(document.getElementById('step-sec').value)||0;
  const dur = min*60+sec;
  if(dur<=0){ toast('Durée invalide'); return; }
  const step = {name: name||`Étape ${steps.length+1}`, dur};
  if(editingStepIdx===null) steps.push(step);
  else steps[editingStepIdx] = step;
  closeModal('modal-step');
  renderSteps();
  updateTotal();
  saveData();
}
function deleteStep(idx){
  steps.splice(idx,1);
  renderSteps();
  updateTotal();
  saveData();
}
function moveStep(idx, dir){
  const to = idx+dir;
  if(to<0||to>=steps.length) return;
  [steps[idx],steps[to]]=[steps[to],steps[idx]];
  renderSteps();
  saveData();
}
function renderSteps(){
  const el = document.getElementById('steps-list');
  if(!steps.length){
    el.innerHTML = `<div class="empty"><span class="ico ico-xl" style="margin:0 auto 8px;color:var(--color-text-secondary)">${ICON.clock}</span>Aucun minuteur.<br>Appuyez sur + pour commencer.</div>`;
    return;
  }
  el.innerHTML = steps.map((s,i)=>`
    <div class="step-row">
      <div class="step-num">${i+1}</div>
      <div class="step-label">${esc(s.name)}</div>
      <span class="step-dur">${fmtDur(s.dur)}</span>
      <button class="btn-icon" onclick="moveStep(${i},-1)" title="Monter" ${i===0?'style="opacity:0.3"':''}><span class="ico">${ICON.chevUp}</span></button>
      <button class="btn-icon" onclick="moveStep(${i},1)" title="Descendre" ${i===steps.length-1?'style="opacity:0.3"':''}><span class="ico">${ICON.chevDown}</span></button>
      <button class="btn-icon" onclick="editStep(${i})" title="Modifier"><span class="ico">${ICON.pencil}</span></button>
      <button class="btn-icon" onclick="deleteStep(${i})" title="Supprimer"><span class="ico">${ICON.trash}</span></button>
    </div>
  `).join('');
}
function updateTotal(){
  const total = steps.reduce((a,s)=>a+s.dur,0);
  document.getElementById('total-display').textContent = fmtDur(total);
}
function fmtDur(s){
  if(s<60) return s+'s';
  return Math.floor(s/60)+'m '+(s%60>0?(s%60)+'s':'');
}
function fmtTime(s){
  const m = Math.floor(s/60);
  const sc = s%60;
  return `${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
}
function esc(str){ return String(str).replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ---------- Renommer la séquence ---------- */
function openRenameModal(){
  document.getElementById('rename-input').value = seqName;
  openModal('modal-rename');
}
function applyRename(){
  const v = document.getElementById('rename-input').value.trim();
  if(v){ seqName = v; document.getElementById('seq-title-display').textContent = v; saveData(); }
  closeModal('modal-rename');
}

/* ---------- Badge "en cours de modification d'un profil" ---------- */
function updateEditingBadge(){
  const badge = document.getElementById('edit-badge');
  if(editingProfileIndex!==null && profiles[editingProfileIndex]){
    badge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
  }
}
function cancelEditing(){
  editingProfileIndex = null;
  steps = [];
  seqName = 'Nouvelle séquence';
  document.getElementById('seq-title-display').textContent = seqName;
  renderSteps();
  updateTotal();
  saveData();
  updateEditingBadge();
  toast('Nouvelle séquence vierge');
}

/* ---------- Sauvegarde / Mise à jour de profil ---------- */
function openSaveModal(){
  if(!steps.length){ toast('Ajoutez au moins un minuteur.'); return; }
  document.getElementById('profile-name-input').value = seqName;
  const title = document.getElementById('modal-save-title');
  const primaryBtn = document.getElementById('modal-save-primary-btn');
  const secondaryBtn = document.getElementById('modal-save-secondary-btn');
  if(editingProfileIndex!==null && profiles[editingProfileIndex]){
    title.textContent = 'Mettre à jour le profil';
    primaryBtn.textContent = 'Mettre à jour';
    primaryBtn.setAttribute('onclick',"saveProfile('update')");
    secondaryBtn.style.display = 'block';
  } else {
    title.textContent = 'Sauvegarder le profil';
    primaryBtn.textContent = 'Sauvegarder';
    primaryBtn.setAttribute('onclick',"saveProfile('new')");
    secondaryBtn.style.display = 'none';
  }
  openModal('modal-save');
}
function saveProfile(mode){
  const name = document.getElementById('profile-name-input').value.trim()||seqName;
  seqName = name;
  document.getElementById('seq-title-display').textContent = seqName;
  if(mode==='update' && editingProfileIndex!==null && profiles[editingProfileIndex]){
    profiles[editingProfileIndex] = {name, steps:JSON.parse(JSON.stringify(steps)), saved:Date.now()};
    toast('Profil « '+name+' » mis à jour');
  } else {
    profiles.unshift({name, steps:JSON.parse(JSON.stringify(steps)), saved:Date.now()});
    editingProfileIndex = 0;
    toast('Profil « '+name+' » sauvegardé');
  }
  saveProfilesData();
  saveData();
  updateEditingBadge();
  closeModal('modal-save');
}

/* ---------- Profils ---------- */
function renderProfiles(){
  const el = document.getElementById('profiles-list');
  if(!profiles.length){
    el.innerHTML = `<div class="empty"><span class="ico ico-xl" style="margin:0 auto 8px;color:var(--color-text-secondary)">${ICON.bookmark}</span>Aucun profil sauvegardé.<br>Créez une séquence puis touchez « Sauvegarder ».</div>`;
    return;
  }
  el.innerHTML = profiles.map((p,i)=>`
    <div class="profile-card" onclick="editProfile(${i})">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
        <div style="min-width:0">
          <div class="profile-name">${esc(p.name)}</div>
          <div class="profile-meta">${p.steps.length} minuteur(s) · <span class="total-badge">${fmtDur(p.steps.reduce((a,s)=>a+s.dur,0))}</span></div>
        </div>
        <div style="display:flex;gap:0;flex-shrink:0">
          <button class="btn-icon" onclick="event.stopPropagation();playProfile(${i})" title="Lancer"><span class="ico">${ICON.play}</span></button>
          <button class="btn-icon" onclick="event.stopPropagation();deleteProfile(${i})" title="Supprimer"><span class="ico">${ICON.trash}</span></button>
        </div>
      </div>
      <div style="margin-top:8px;font-size:12px;color:var(--color-text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.steps.map(s=>esc(s.name)+' ('+fmtDur(s.dur)+')').join(' → ')}</div>
    </div>
  `).join('');
}
function editProfile(i){
  const p = profiles[i];
  steps = JSON.parse(JSON.stringify(p.steps));
  seqName = p.name;
  editingProfileIndex = i;
  document.getElementById('seq-title-display').textContent = seqName;
  renderSteps();
  updateTotal();
  saveData();
  updateEditingBadge();
  showScreen('editor');
}
function playProfile(i){
  const p = profiles[i];
  if(!p.steps.length){ toast('Ce profil est vide.'); return; }
  timerSteps = JSON.parse(JSON.stringify(p.steps));
  currentStepIdx = 0;
  paused = false;
  launchSource = 'profiles';
  document.getElementById('timer-seq-name').textContent = p.name;
  document.getElementById('finish-area').innerHTML = '';
  showTimerScreen();
  startStep(0);
}
function deleteProfile(i){
  if(!confirm('Supprimer ce profil ?')) return;
  profiles.splice(i,1);
  if(editingProfileIndex===i) editingProfileIndex = null;
  else if(editingProfileIndex!==null && editingProfileIndex>i) editingProfileIndex--;
  saveProfilesData();
  saveData();
  renderProfiles();
  updateEditingBadge();
}

/* ---------- Lecture du minuteur ---------- */
function startSequence(){
  if(!steps.length){ toast('Ajoutez au moins un minuteur.'); return; }
  timerSteps = JSON.parse(JSON.stringify(steps));
  currentStepIdx = 0;
  paused = false;
  launchSource = 'editor';
  document.getElementById('timer-seq-name').textContent = seqName;
  document.getElementById('finish-area').innerHTML = '';
  showTimerScreen();
  startStep(0);
}
function showTimerScreen(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-timer').classList.add('active');
  requestWakeLock();
}
function startStep(idx){
  if(timerInterval) clearInterval(timerInterval);
  if(idx>=timerSteps.length){ onFinish(); return; }
  currentStepIdx = idx;
  const step = timerSteps[idx];
  stepTotal = step.dur;
  timeLeft = step.dur;
  stepEndTime = Date.now() + step.dur*1000;
  paused = false;
  document.getElementById('timer-step-name').textContent = step.name;
  document.getElementById('btn-playpause').innerHTML = `<span class="ico ico-lg">${ICON.pause}</span>`;
  updateTimerDisplay();
  renderQueue();
  timerInterval = setInterval(tick, 250);
}
function tick(){
  if(paused) return;
  const remainingMs = stepEndTime - Date.now();
  timeLeft = Math.max(0, Math.ceil(remainingMs/1000));
  updateTimerDisplay();
  if(remainingMs<=0){
    clearInterval(timerInterval);
    buzz();
    setTimeout(()=>startStep(currentStepIdx+1), 600);
  }
}
function updateTimerDisplay(){
  document.getElementById('timer-display').textContent = fmtTime(timeLeft);
  const pct = stepTotal>0 ? (timeLeft/stepTotal)*100 : 0;
  document.getElementById('timer-bar').style.width = pct+'%';
  const rem = timerSteps.length - currentStepIdx - 1;
  document.getElementById('timer-remaining-steps').textContent = rem>0 ? rem+' minuteur(s) suivant(s)' : 'Dernier minuteur';
}
function renderQueue(){
  const el = document.getElementById('step-queue');
  el.innerHTML = timerSteps.map((s,i)=>{
    let cls = '';
    if(i===currentStepIdx) cls='active';
    else if(i<currentStepIdx) cls='done';
    return `<div class="q-item ${cls}"><div class="q-dot"></div><span>${esc(s.name)}</span><span style="margin-left:auto;font-size:12px">${fmtDur(s.dur)}</span></div>`;
  }).join('');
}
function togglePause(){
  paused = !paused;
  if(paused){ pauseStarted = Date.now(); }
  else { stepEndTime += (Date.now()-pauseStarted); }
  const btn = document.getElementById('btn-playpause');
  btn.innerHTML = paused ? `<span class="ico ico-lg">${ICON.play}</span>` : `<span class="ico ico-lg">${ICON.pause}</span>`;
}
function skipStep(){
  clearInterval(timerInterval);
  startStep(currentStepIdx+1);
}
function stopAll(){
  clearInterval(timerInterval);
  timerInterval = null;
  showScreen(launchSource);
}
function onFinish(){
  clearInterval(timerInterval);
  document.getElementById('timer-display').textContent = '00:00';
  document.getElementById('timer-step-name').textContent = 'Terminé !';
  document.getElementById('timer-bar').style.width = '0%';
  document.getElementById('finish-area').innerHTML = `
    <div class="finish-banner">
      <p>✓ Séquence terminée !</p>
      <small>Total : ${fmtDur(timerSteps.reduce((a,s)=>a+s.dur,0))}</small>
      <br><br>
      <button class="btn primary" onclick="startSequence()">Relancer</button>
      <button class="btn" onclick="stopAll()" style="margin-left:8px">Retour</button>
    </div>`;
  buzz();
}
function buzz(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 880;
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.4);
    o.start(ctx.currentTime);
    o.stop(ctx.currentTime+0.4);
  }catch(e){}
  try{ if(navigator.vibrate) navigator.vibrate([120,60,120]); }catch(e){}
}

/* ---------- Toast (remplace les alert() pour un rendu plus "app") ---------- */
let toastTimer = null;
function toast(msg){
  let el = document.getElementById('toast');
  if(!el){
    el = document.createElement('div');
    el.id = 'toast';
    el.className = 'toast';
    document.getElementById('app').appendChild(el);
  }
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2200);
}

/* ---------- Anti-veille : empêche l'écran de s'éteindre tant que l'app est ouverte ---------- */
let wakeLock = null;
async function requestWakeLock(){
  try{
    if('wakeLock' in navigator){
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', ()=>{ wakeLock = null; });
    }
  }catch(e){ /* refusé (ex: économie de batterie) -> on retentera plus tard */ }
}
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState==='visible'){
    requestWakeLock();
    // resynchronise l'affichage si le minuteur tournait pendant que l'app était masquée
    if(timerInterval && !paused) tick();
  }
});
// Sur certains navigateurs le verrou doit être (re)demandé après une interaction utilisateur
document.addEventListener('pointerdown', ()=>{ if(!wakeLock) requestWakeLock(); });

/* ---------- Service worker (mise en cache hors-ligne) ---------- */
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

/* ---------- Démarrage ---------- */
fillIcons();
loadData();
requestWakeLock();
</script>
